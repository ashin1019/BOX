<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>直播點歌 - 文青大字版</title>
    <style>
        :root {
            --bg-color: #FAFAFA;
            --panel-bg: #FFFFFF;
            --text-primary: #4A4A4A;
            --text-secondary: #9B9B9B;
            --accent-warm: #D4C4A8;
            --accent-active: #A89B8D;
            --wheel-border: #E0E0E0;
        }

        body { 
            display: flex; flex-direction: column; height: 100vh; margin: 0; 
            font-family: "Helvetica Neue", Helvetica, Arial, "PingFang TC", "Microsoft JhengHei", sans-serif; 
            background: var(--bg-color); color: var(--text-primary); overflow: hidden; 
            -webkit-font-smoothing: antialiased;
        }
        
        /* 縮小上方控制區 */
        .admin-panel { 
            height: 28%; padding: 15px; 
            background: var(--panel-bg); 
            border-bottom: 1px solid var(--wheel-border); 
            z-index: 100; box-sizing: border-box; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        
        .panel-title { font-size: 10px; color: var(--text-secondary); letter-spacing: 4px; margin-bottom: 10px; text-transform: uppercase; }

        /* 縮小按鈕尺寸 */
        .category-group { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; justify-content: center; }
        .cat-btn { 
            padding: 6px 12px; background: var(--panel-bg); color: var(--accent-active); 
            border: 1px solid var(--accent-warm); 
            border-radius: 15px; font-size: 13px; cursor: pointer; transition: all 0.3s;
        }
        .cat-btn.active, .cat-btn.all-active { background: var(--accent-warm); color: white; border-color: var(--accent-warm); }

        .spin-btn { 
            width: 70%; padding: 10px; background: var(--accent-active); color: white; 
            font-size: 16px; border: none; border-radius: 20px; cursor: pointer; letter-spacing: 2px;
        }

        /* 隱藏編輯器，只在需要時顯示（或透過 console 修改） */
        #song_editor { display: none; }

        /* 增大轉盤顯示區 */
        .display-panel { height: 72%; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg-color); }
        
        .wheel-container { 
            position: relative; width: 280px; height: 280px; 
            border: 1px solid var(--wheel-border); border-radius: 50%; padding: 5px; background: white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
        }
        
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 2px; height: 40px; background: var(--accent-active); z-index: 10; }
        .pointer::after { content: ''; position: absolute; bottom: -5px; left: -4px; width: 10px; height: 10px; background: var(--accent-active); border-radius: 50%; }

        #wheel { width: 100%; height: 100%; border-radius: 50%; transition: transform 2.5s cubic-bezier(0.1, 0, 0.1, 1); background: conic-gradient(#EEE 0%, #FFF 100%); }

        /* 超大結果顯示 */
        #result { 
            margin-top: 40px; font-size: 48px; color: var(--accent-active); 
            font-weight: 700; text-align: center; width: 90%;
            letter-spacing: -1px; line-height: 1.2;
            word-break: break-all; /* 防止長歌名溢出 */
            text-shadow: 0 2px 10px rgba(168, 155, 141, 0.2);
        }
    </style>
</head>
<body>

    <audio id="snd_spin" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" preload="auto" loop></audio>
    <audio id="snd_win" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3" preload="auto"></audio>

    <div class="admin-panel">
        <div class="panel-title">SELECT CATEGORY</div>
        <div class="category-group">
            <button class="cat-btn" id="btn_all" onclick="selectAllSongs(this)">全部</button>
            <button class="cat-btn active" onclick="selectCategory('國語', this)">國語</button>
            <button class="cat-btn" onclick="selectCategory('台語', this)">台語</button>
            <button class="cat-btn" onclick="selectCategory('粵語', this)">粵語</button>
            <button class="cat-btn" onclick="selectCategory('老歌', this)">老歌</button>
            <button class="cat-btn" onclick="selectCategory('新歌', this)">新歌</button>
        </div>
        <button class="spin-btn" onclick="spinWheel()">SPIN</button>
        <textarea id="song_editor"></textarea>
    </div>

    <div class="display-panel">
        <div class="pointer"></div>
        <div class="wheel-container">
            <div id="wheel"></div>
        </div>
        <div id="result">---</div>
    </div>

    <script>
        let songDatabase = {
            "國語": "告白氣球,演員,晴天,十年,小幸運,那些年,修煉愛情,泡沫,關鍵詞,說好不哭",
            "台語": "浪子回頭,愛拼才會贏,家後,傷心酒店,雨夜花,男人情女人心,繁華攏是夢",
            "粵語": "海闊天空,紅日,富士山下,友情歲月,講不出再見,千千闕歌,月半小夜曲",
            "老歌": "甜蜜蜜,小城故事,月亮代表我的心,往事只能回味,夜來香,恰似你的溫柔",
            "新歌": "這世界那麼多人,孤勇者,烏梅子醬,如果可以,刻在我心底的名字,飛鳥和蟬"
        };

        const morandiColors = ["#D8C3A5", "#8E8D8A", "#E98074", "#A8D0E6", "#C2CAD0", "#F4EAE1", "#B8A99A", "#D1E8E2", "#EAE7DC", "#F8B195"];
        let currentCategory = "國語";
        let currentRotation = 0;
        let isSpinning = false;
        const sndSpin = document.getElementById('snd_spin');
        const sndWin = document.getElementById('snd_win');

        window.onload = () => { selectCategory('國語', document.querySelector('.cat-btn.active')); };

        function selectAllSongs(btnElement) {
            if (isSpinning) return;
            clearActiveClasses();
            btnElement.classList.add('all-active');
            document.getElementById('song_editor').value = Object.values(songDatabase).join(',');
            document.getElementById('result').innerText = "READY";
            updateWheel();
        }

        function selectCategory(cat, btnElement) {
            if (isSpinning) return;
            clearActiveClasses();
            btnElement.classList.add('active');
            currentCategory = cat;
            document.getElementById('song_editor').value = songDatabase[cat];
            document.getElementById('result').innerText = cat;
            updateWheel();
        }

        function clearActiveClasses() {
            document.querySelectorAll('.cat-btn').forEach(b => { b.classList.remove('active'); b.classList.remove('all-active'); });
        }

        function updateWheel() {
            const songs = document.getElementById('song_editor').value.split(',').filter(s => s.trim() !== "");
            const wheel = document.getElementById('wheel');
            if (songs.length === 0) return;
            let gradientStr = "conic-gradient(";
            songs.forEach((song, i) => {
                const start = (i * (360 / songs.length)).toFixed(2);
                const end = ((i + 1) * (360 / songs.length)).toFixed(2);
                gradientStr += `${morandiColors[i % morandiColors.length]} ${start}deg ${end}deg,`;
            });
            wheel.style.background = gradientStr.slice(0, -1) + ")";
        }

        function spinWheel() {
            if (isSpinning) return;
            const songs = document.getElementById('song_editor').value.split(',').filter(s => s.trim() !== "");
            isSpinning = true;
            sndSpin.currentTime = 0;
            sndSpin.playbackRate = 1.8;
            sndSpin.play();

            let rateTracker = 1.8;
            let speedDownTimer = setInterval(() => {
                if (rateTracker > 0.5) { rateTracker -= 0.08; sndSpin.playbackRate = rateTracker; }
            }, 80);

            currentRotation += (Math.floor(Math.random() * 360) + 2880);
            document.getElementById('wheel').style.transform = `rotate(${currentRotation}deg)`;
            document.getElementById('result').innerText = "抽獎中...";

            setTimeout(() => {
                clearInterval(speedDownTimer);
                sndSpin.pause();
                sndWin.play();
                const finalAngle = (currentRotation % 360);
                const index = Math.floor(((360 - (finalAngle % 360)) % 360) / (360 / songs.length));
                document.getElementById('result').innerText = songs[index];
                isSpinning = false;
            }, 2500);
        }
    </script>
</body>
</html>
